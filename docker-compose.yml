version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tender_postgres
    environment:
      POSTGRES_DB: tender_portal
      POSTGRES_USER: tender
      POSTGRES_PASSWORD: tender_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tender_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
